services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - gp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    environment:
      # Всегда хост `db` в сети Compose. Иначе переменная DATABASE_URL_SYNC с машины разработчика
      # (например 127.0.0.1 для pytest на хосте) подставляется при `docker compose up` и ломает API.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      ALLOW_INSECURE_SEED_DEFAULTS: ${ALLOW_INSECURE_SEED_DEFAULTS:-}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-}
      SEED_PASSWORD_ADMIN: ${SEED_PASSWORD_ADMIN:-}
      SEED_PASSWORD_EVGENIY: ${SEED_PASSWORD_EVGENIY:-}
      SEED_PASSWORD_PAVEL: ${SEED_PASSWORD_PAVEL:-}
      SEED_PASSWORD_MARKETING: ${SEED_PASSWORD_MARKETING:-}
      SEED_PASSWORD_MANAGER: ${SEED_PASSWORD_MANAGER:-}
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    command:
      - uvicorn
      - gp_api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./apps/web
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      # Polling по bind-mount с Windows грузит CPU и раздувает ответы Vite до 10–20+ с (см. debug-6d5457 H2).
      # HMR по src может не сработать без polling — тогда `pnpm dev` на хосте или `docker compose restart web` после правок.
      CHOKIDAR_USEPOLLING: "false"
      CHOKIDAR_INTERVAL: "8000"
      HMR_CLIENT_PORT: ${WEB_HOST_PORT:-5174}
    # Без привязки только к 127.0.0.1: иначе `localhost` (часто IPv6 ::1) не попадает в порт и браузер висит до таймаута.
    ports:
      - "${WEB_HOST_PORT:-5174}:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    # Пустой том node_modules + кэш .vite давали «залипший» старый бандл при смене кода на хосте.
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f node_modules/.bin/vite ]; then
          echo "gp-web: pnpm install (пустой том node_modules)..."
          pnpm install --frozen-lockfile
        fi
        rm -rf node_modules/.vite
        exec pnpm dev --host 0.0.0.0 --port 5173

volumes:
  gp_pgdata:
  web_node_modules:
