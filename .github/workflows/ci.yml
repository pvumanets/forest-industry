name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: grove_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: grove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grove_test -d grove_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://grove_test:test@localhost:5432/grove_test
      DATABASE_URL_SYNC: postgresql+psycopg://grove_test:test@localhost:5432/grove_test
      CORS_ORIGINS: http://localhost:5173
      ALLOW_INSECURE_SEED_DEFAULTS: "1"
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
